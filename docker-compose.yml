services:
  db:
    image: mariadb:11
    container_name: platform-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: otptestdb
      MYSQL_USER: otptestuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    image: classroom-sharing-system:latest
    container_name: otp
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://db:3306/otptestdb
      JAVA_TOOL_OPTIONS: -Dprism.order=sw
      DISPLAY: host.docker.internal:0.0
    ports:
      - "7700:7700"
    restart: unless-stopped

volumes:
  db_data:
